name: Code Quality
description: Run ESLint with reviewdog.

runs:
  using: composite
  steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 20

    - name: Install dependencies
      shell: bash
      run: |
        npm ci --prefix "$GITHUB_ACTION_PATH"
        echo "$GITHUB_ACTION_PATH/node_modules/.bin" >> "$GITHUB_PATH"

    - name: Check ESLint
      uses: reviewdog/action-eslint@v1
      with:
        reporter: github-pr-check
        filter_mode: added
        fail_level: error
        workdir: .
        eslint_flags: '. --config "${{ github.action_path }}/eslint.config.mjs"'
