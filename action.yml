name: Code Quality
description: Run ESLint with reviewdog.

runs:
  using: composite
  steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 20

    - name: Check ESLint
      uses: reviewdog/action-eslint@v1
      with:
        reporter: github-pr-check
        filter_mode: added
        fail_level: error
        workdir: .
        eslint_flags: '. --config "$GITHUB_ACTION_PATH/eslint.config.mjs"'
