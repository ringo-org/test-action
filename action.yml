name: Code Quality
description: Run Node.js lint checks with the action-owned ESLint setup.

runs:
  using: composite
  steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 20

    - name: Install action dependencies
      shell: bash
      run: npm ci --prefix "$GITHUB_ACTION_PATH"

    - name: Run lint
      shell: bash
      run: '"$GITHUB_ACTION_PATH/node_modules/.bin/eslint" . --config "$GITHUB_ACTION_PATH/eslint.config.mjs" --format github'
