name: Code Quality
description: Run Node.js dependency installation and lint checks.

runs:
  using: composite
  steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 20

    - name: Install dependencies
      shell: bash
      run: npm ci

    - name: Run lint
      shell: bash
      run: npm run lint --if-present
